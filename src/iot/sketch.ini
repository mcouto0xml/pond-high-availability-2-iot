#include <WiFi.h>
#include <HTTPClient.h>
#include <DHT.h>

// ─── WiFi ─────────────────────────────────────────────────────────────────────
const char* WIFI_SSID     = "Wokwi-GUEST";
const char* WIFI_PASSWORD = "";

// ─── Servidor ─────────────────────────────────────────────────────────────────
const char* SERVER_URL    = "http://35.192.65.120:8080/telemetry";

// ─── Intervalo ────────────────────────────────────────────────────────────────
const unsigned long SEND_INTERVAL = 5000;

// ─── Pinos ────────────────────────────────────────────────────────────────────
#define DHT_PIN       2
#define DHT_TYPE      DHT22
#define PIR_PIN       3
#define LDR_PIN       27   // ADC1
#define POT_PIN       26   // ADC0

DHT dht(DHT_PIN, DHT_TYPE);

// ─── Leitura dos Sensores ─────────────────────────────────────────────────────

float readTemperature() {
  float t = dht.readTemperature();
  if (isnan(t)) {
    Serial.println("[SENSOR] DHT22 falhou, usando valor fallback");
    return 25.0;
  }
  return t;
}

float readHumidity() {
  float h = dht.readHumidity();
  if (isnan(h)) {
    Serial.println("[SENSOR] DHT22 falhou, usando valor fallback");
    return 60.0;
  }
  return h;
}

bool readPresence() {
  return digitalRead(PIR_PIN) == HIGH;
}

float readLuminosity() {
  // LDR retorna 0-4095 (12-bit ADC); converte para lux (0–10000 lx)
  int raw = analogRead(LDR_PIN);
  return (raw / 4095.0) * 10000.0;
}

float readTankLevel() {
  // Potenciômetro: 0-4095 → 0.0% a 100.0%
  return 20.0;
}

float readVibration() {
  // Sensor de vibração não disponível no Wokwi — gera valor simulado
  return random(0, 100) / 1000.0;  // 0.000 a 0.099 m/s²
}

// ─── WiFi ─────────────────────────────────────────────────────────────────────
void connectWiFi() {
  Serial.print("[WiFi] Conectando a: ");
  Serial.println(WIFI_SSID);

  WiFi.mode(WIFI_STA);
  WiFi.begin(WIFI_SSID, WIFI_PASSWORD);

  int tentativas = 0;
  while (WiFi.status() != WL_CONNECTED) {
    delay(500);
    Serial.print(".");
    tentativas++;
    if (tentativas > 30) {
      Serial.println("\n[WiFi] Falha. Reiniciando...");
      rp2040.reboot();
    }
  }

  Serial.println("\n[WiFi] Conectado!");
  Serial.print("[WiFi] IP: ");
  Serial.println(WiFi.localIP());
}

// ─── Envio HTTP ───────────────────────────────────────────────────────────────
void sendTelemetry() {
  if (WiFi.status() != WL_CONNECTED) {
    Serial.println("[HTTP] WiFi desconectado. Reconectando...");
    connectWiFi();
    return;
  }

  // Coleta todos os sensores
  float temperature = readTemperature();
  float humidity    = readHumidity();
  bool  presence    = readPresence();
  float vibration   = readVibration();
  float luminosity  = readLuminosity();
  float tank_level  = readTankLevel();

  // Monta JSON conforme schema do banco
  String payload = "{";
  payload += "\"iot_name\":\"sensor-01\",";
  payload += "\"temperature\":"  + String(temperature, 2) + ",";
  payload += "\"humidity\":"     + String(humidity, 2)    + ",";
  payload += "\"presence\":"     + String(presence ? "true" : "false") + ",";
  payload += "\"vibration\":"    + String(vibration, 3)   + ",";
  payload += "\"luminosity\":"   + String(luminosity, 1)  + ",";
  payload += "\"tank_level\":"   + String(tank_level, 1);
  payload += "}";

  Serial.println("\n[HTTP] Enviando: " + payload);

  HTTPClient http;
  http.begin(SERVER_URL);
  http.addHeader("Content-Type", "application/json");

  int httpCode = http.POST(payload);

  if (httpCode > 0) {
    Serial.printf("[HTTP] Resposta: %d\n", httpCode);
    String response = http.getString();
    Serial.println("[HTTP] Body: " + response.substring(0, 200));
  } else {
    Serial.printf("[HTTP] Erro: %s\n", http.errorToString(httpCode).c_str());
  }

  http.end();
}

// ─── Setup / Loop ─────────────────────────────────────────────────────────────
void setup() {
  Serial.begin(115200);
  delay(1000);

  Serial.println("=== Pico W - Telemetria IoT ===");

  dht.begin();
  pinMode(PIR_PIN, INPUT);
  analogReadResolution(12); // ADC 12-bit (0–4095)

  randomSeed(analogRead(28)); // pino flutuante como seed

  connectWiFi();
}

unsigned long lastSendTime = 0;

void loop() {
  unsigned long now = millis();

  if (now - lastSendTime >= SEND_INTERVAL) {
    lastSendTime = now;
    sendTelemetry();
  }
}